; cross/aarch64-linux-gnu.ini — meson cross-compile config for aarch64
;
; Usage:
;   meson setup build-aarch64 --cross-file cross/aarch64-linux-gnu.ini
;   ninja -C build-aarch64
;
; Test on x86-64 host via QEMU user-mode:
;   qemu-aarch64 -L /usr/aarch64-linux-gnu ./build-aarch64/test_hook
;   qemu-aarch64 -L /usr/aarch64-linux-gnu ./build-aarch64/test_inline
;
; Prerequisites (Ubuntu/Debian):
;   sudo apt install gcc-aarch64-linux-gnu qemu-user qemu-user-static
;
; For running the injector tests (test_syringe) under QEMU you also need
; a statically-linked QEMU binfmt handler:
;   sudo update-binfmts --enable qemu-aarch64

[binaries]
c = 'aarch64-linux-gnu-gcc'
cpp = 'aarch64-linux-gnu-g++'
strip = 'aarch64-linux-gnu-strip'
ar = 'aarch64-linux-gnu-ar'
ld = 'aarch64-linux-gnu-ld'

[host_machine]
system = 'linux'
cpu_family = 'aarch64'
cpu = 'cortex-a72'   ; generic ARMv8 core; override for specific SoC
endian = 'little'
